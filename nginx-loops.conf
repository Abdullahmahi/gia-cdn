server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Health check / root
    location = / {
        default_type text/plain;
        return 200 "gia-cdn ok\n";
    }

    # The loops, with caching + permissive CORS so email image proxies can fetch them.
    location /loops/ {
        add_header Cache-Control "public, max-age=900";   # 15 min
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }
}
